name: Bug report
description: Report a reproducible problem with YTM Mini Mode.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug.
        Please fill out the details below so we can reproduce and fix it faster.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      description: Confirm these before submitting.
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am using the latest available extension version.
          required: true

  - type: dropdown
    id: browsers
    attributes:
      label: Browser(s)
      description: Select where this bug happens.
      multiple: true
      options:
        - Chrome
        - Firefox
        - Other Chromium browser
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: Extension version
      description: The extension version where you see the issue.
      placeholder: "Example: 1.2.0"
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What is happening right now?
      placeholder: "Describe the bug you are seeing."
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: "Describe what you expected."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Provide clear, minimal steps to trigger the issue.
      placeholder: |
        1. Open YouTube Music
        2. Click the mini-player toggle
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Share your setup details.
      value: |
        - OS:
        - Browser version:
        - YTM Mini Mode version:
        - Logged in to YouTube Music: Yes/No
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console errors or logs
      description: Paste relevant console output if available.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Drag and drop screenshots/videos here if useful.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Any extra details that may help us investigate.
    validations:
      required: false
