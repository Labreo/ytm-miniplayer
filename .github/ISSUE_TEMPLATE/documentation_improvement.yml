name: Documentation improvement
description: Report unclear, missing, or incorrect documentation.
title: "[Docs]: "
labels:
  - documentation
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the docs.
        Clear reports help us fix documentation quickly for everyone.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate docs report.
          required: true

  - type: input
    id: docs_location
    attributes:
      label: Documentation location
      description: Which file/section/page needs improvement?
      placeholder: "Example: README.md - Local Setup Instructions"
    validations:
      required: true

  - type: dropdown
    id: docs_issue_type
    attributes:
      label: Type of documentation issue
      options:
        - Missing information
        - Incorrect information
        - Outdated information
        - Unclear explanation
        - Formatting or grammar
        - Other
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: What is unclear or missing?
      description: Explain the current problem.
      placeholder: "The current docs do not explain..."
    validations:
      required: true

  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested improvement
      description: What change should be made?
      placeholder: "I suggest adding/updating..."
    validations:
      required: true

  - type: textarea
    id: target_audience
    attributes:
      label: Who is affected?
      description: Example: new contributors, first-time users, maintainers.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Any links, examples, or screenshots that help.
    validations:
      required: false
