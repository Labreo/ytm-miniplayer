name: Feature request
description: Suggest an improvement or new capability for YTM Mini Mode.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Well-scoped feature requests help us evaluate and ship improvements faster.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find the same request.
          required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: "I am always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe your ideal solution.
      placeholder: "It would help if the extension could..."
    validations:
      required: true

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?
      placeholder: "I also considered..."
    validations:
      required: false

  - type: dropdown
    id: impact_area
    attributes:
      label: Main impact area
      description: Which area does this mostly affect?
      options:
        - UI or UX
        - Playback workflow
        - Browser compatibility
        - Performance
        - Build or tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Suggested acceptance criteria
      description: How can we verify this feature is done?
      placeholder: |
        - [ ] Behavior X is available
        - [ ] Works in Chrome and Firefox
        - [ ] No regression in pop-out/pop-in flow
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Mockups, examples, or related links.
    validations:
      required: false
